spring.datasource.url=${TS_JDBC_URL:jdbc:postgresql://localhost:5432/timeseries}
spring.datasource.username=${TS_DB_USER:postgres}
spring.datasource.password=${TS_DB_PASSWORD:postgres}

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=ts-pool
spring.datasource.hikari.data-source-properties.reWriteBatchedInserts=true
spring.datasource.hikari.data-source-properties.prepareThreshold=5

spring.jackson.serialization.write-dates-as-timestamps=false
server.error.include-stacktrace=never

# Keycloak OAuth2 Resource Server
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/timeseries
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/timeseries/protocol/openid-connect/certs

# Keycloak Admin Client (Service Account)
keycloak.admin.url=http://localhost:8180
keycloak.admin.realm=timeseries
keycloak.admin.client-id=timeseries-backend
keycloak.admin.client-secret=CHANGE_ME
